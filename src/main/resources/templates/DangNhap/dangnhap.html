<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .login-container {
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333333;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .error, .success {
            text-align: center;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .navbar-brand {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 100px;
            height: auto;
        }
    </style>
</head>
<body>
<div class="login-container">
    <a class="navbar-brand" href="#">
        <img th:src="@{/images/images.png}" class="logo" alt="Logo">
    </a>
    <h2>Đăng Nhập</h2>

    <!-- Thông báo đăng nhập thành công hoặc thất bại -->
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>

    <form action="/api/xac-thuc/dang-nhap" method="post">
        <label for="tenDangNhap">Username:</label>
        <input type="text" id="tenDangNhap" name="tenDangNhap" placeholder="Enter your username" required>

        <label for="matKhau">Password:</label>
        <input type="password" id="matKhau" name="matKhau" placeholder="Enter your password" required>

        <div style="margin-top: 15px;">
            <a class="nav-link" style="text-decoration: none; color: rgba(0, 0, 0, 0.5);">Đăng kí</a>
            <a class="nav-link ml-2" style="text-decoration: none; color: rgba(0, 0, 0, 0.5);">Đổi mật khẩu</a>
        </div>

        <input class="mt-2" type="submit" value="Đăng Nhập">
    </form>
</div>
</body>
</html>
