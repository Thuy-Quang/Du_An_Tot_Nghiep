<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .login-container {
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333333;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .error {
            color: red;
            text-align: center;
        }
        .navbar-brand {
            display: flex;            /* Sử dụng flexbox */
            justify-content: center;  /* Căn giữa theo chiều ngang */
            align-items: center;      /* Căn giữa theo chiều dọc (nếu cần) */
            text-align: center;       /* Đảm bảo văn bản căn giữa nếu có */
        }

        .logo {
            width: 100px;  /* Kích thước hình ảnh */
            height: auto; /* Giữ tỉ lệ hình ảnh */
        }

    </style>
</head>
<body>
<div class="login-container">
    <a class="navbar-brand" href="#">
        <img th:src="@{/images/images.png}" class="logo">
    </a>
    <h2>Đăng Nhập </h2>
    <form th:action="@{/api/xac-thuc/dang-nhap}" method="post">
        <label >Username:</label>
        <input type="text"  name="tenDangNhap" placeholder="Enter your username" required>

        <label >Password:</label>
        <input type="password" name="matKhau" placeholder="Enter your password" required>
        <a th:href="@{/dangki}" class="nav-link" style="text-decoration: none; color: rgba(0, 0, 0, 0.5);">
            <i class="bi bi-person"></i> Đăng kí
        </a>
        <a th:href="@{/doimk}" class="nav-link ml-2" style="text-decoration: none; color: rgba(0, 0, 0, 0.5);">
            <i class="bi bi-person"></i> Đổi mật khẩu
        </a>
        <input class="mt-2" type="submit" value="Đăng Nhập">
    </form>
    <div class="error">
        <!-- Thông báo lỗi nếu có -->
    </div>
</div>
</body>
</html>
