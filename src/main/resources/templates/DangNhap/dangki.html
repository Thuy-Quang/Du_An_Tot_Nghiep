<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .registration-container {
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333333;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .error {
            color: red;
            text-align: center;
        }
        .navbar-brand {
            display: flex;            /* Sử dụng flexbox */
            justify-content: center;  /* Căn giữa theo chiều ngang */
            align-items: center;      /* Căn giữa theo chiều dọc (nếu cần) */
            text-align: center;       /* Đảm bảo văn bản căn giữa nếu có */
        }

        .logo {
            width: 100px;  /* Kích thước hình ảnh */
            height: auto; /* Giữ tỉ lệ hình ảnh */
        }
    </style>
</head>
<body>

<div class="registration-container">
    <a class="navbar-brand" href="#">
        <img th:src="@{/images/images.png}" class="logo">
    </a>
    <h2>Đăng kí </h2>

    <form action="register-process.php" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder=" username" required>

        <label for="email">SDT:</label>
        <input type="email" id="sdt" name="sdt" placeholder=" sdt" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder=" email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder=" password" required>

        <input type="submit" value="Đăng Kí">   </form>
    <div class="error">
        <!-- Thông báo lỗi nếu có -->
    </div>
</div>

</body>
</html>
