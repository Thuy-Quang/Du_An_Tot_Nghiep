<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Mã Giảm Giá Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center">Danh Sách Mã Giảm Giá Khách Hàng</h1>
    <a href="/ma-giam-gia-kh/add" class="btn btn-success mb-3">Thêm Mới</a>
    <table class="table table-hover table-bordered">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Tên Người Dùng</th>
            <th>Mã Giảm Giá</th>
            <th>Ngày Áp Dụng</th>
            <th>Ngày Hết Hạn</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${maGiamGiaKHList}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.nguoiDung.hoTen}"></td>
            <td th:text="${item.maGiamGia.ma}"></td>
            <td th:text="${item.ngayApDung}"></td>
            <td th:text="${item.ngayHetHan}"></td>
            <td th:text="${item.trangThai}"></td>
            <td>
                <a th:href="@{/ma-giam-gia-kh/detail/{id}(id=${item.id})}" class="btn btn-info btn-sm">Chi Tiết</a>
                <a th:href="@{/ma-giam-gia-kh/edit/{id}(id=${item.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <form th:action="@{/ma-giam-gia-kh/delete/{id}(id=${item.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa không?');">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
