<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Mã Giảm Giá Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center">Danh Sách Mã Giảm Giá Khách Hàng</h1>
    <div class="d-flex justify-content-end mb-3">
        <a href="javascript:void(0);" onclick="submitForm(event, '/ma-giam-gia-kh/add', document.getElementById('maGiamGiaForm'))" class="btn btn-primary">
            Thêm Mã Giảm Giá
        </a>
    </div>
    <table class="table table-hover table-bordered">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Tên Người Dùng</th>
            <th>Mã Giảm Giá</th>
            <th>Ngày Áp Dụng</th>
            <th>Ngày Hết Hạn</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${maGiamGiaKHList}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.nguoiDung.hoTen}"></td>
            <td th:text="${item.maGiamGia.ma}"></td>
            <td th:text="${item.ngayApDung}"></td>
            <td th:text="${item.ngayHetHan}"></td>
            <td th:text="${item.trangThai}"></td>
            <td>
                <!-- Chi tiết mã giảm giá khách hàng -->
                <a href="javascript:void(0);"
                   th:onclick="'loadContent(\'/ma-giam-gia-kh/detail/' + ${item.id} + '\')'"
                   class="btn btn-info btn-sm">Chi Tiết</a>

                <!-- Sửa mã giảm giá khách hàng -->
                <a href="javascript:void(0);"
                   th:onclick="'loadContent(\'/ma-giam-gia-kh/edit/' + ${item.id} + '\')'"
                   class="btn btn-warning btn-sm">Sửa</a>

                <!-- Xóa mã giảm giá khách hàng -->
                <a href="javascript:void(0);"
                   th:onclick="'deleteItem(\'/ma-giam-gia-kh/delete/' + ${item.id} + '\')'"
                   class="btn btn-danger btn-sm">Xóa</a>
            </td>

        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
