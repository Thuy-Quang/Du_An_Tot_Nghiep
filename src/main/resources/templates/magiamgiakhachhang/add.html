<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Mã Giảm Giá Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center">Thêm Mã Giảm Giá Khách Hàng</h1>
    <form th:action="@{/ma-giam-gia-kh/add}" th:object="${maGiamGiaKH}" method="post" class="p-4 border rounded-3 bg-light">
        <!-- Dropdown Người Dùng -->
        <div class="mb-3">
            <label for="nguoiDung" class="form-label">Người Dùng:</label>
            <select class="form-select" id="nguoiDung" th:field="*{nguoiDung}" required>
                <option value="" th:if="${maGiamGiaKH.nguoiDung == null}" selected>Chọn Người Dùng</option>
                <option th:each="user : ${nguoiDungList}" th:value="${user}" th:text="${user.hoTen}"
                        th:selected="${maGiamGiaKH.nguoiDung?.id == user.id}"></option>
            </select>
        </div>

        <!-- Dropdown Mã Giảm Giá -->
        <div class="mb-3">
            <label for="maGiamGia" class="form-label">Mã Giảm Giá:</label>
            <select class="form-select" id="maGiamGia" th:field="*{maGiamGia}" required>
                <option value="" th:if="${maGiamGiaKH.maGiamGia == null}" selected>Chọn Mã Giảm Giá</option>
                <option th:each="ma : ${maGiamGiaList}" th:value="${ma}" th:text="${ma.ma}"
                        th:selected="${maGiamGiaKH.maGiamGia?.id == ma.id}"></option>
            </select>
        </div>

        <!-- Ngày Áp Dụng -->
        <div class="mb-3">
            <label for="ngayApDung" class="form-label">Ngày Áp Dụng:</label>
            <input type="date" class="form-control" id="ngayApDung" th:field="*{ngayApDung}" required/>
        </div>

        <!-- Ngày Hết Hạn -->
        <div class="mb-3">
            <label for="ngayHetHan" class="form-label">Ngày Hết Hạn:</label>
            <input type="date" class="form-control" id="ngayHetHan" th:field="*{ngayHetHan}" required/>
        </div>

        <!-- Trạng Thái -->
        <div class="mb-3">
            <label for="trangThai" class="form-label">Trạng Thái:</label>
            <select class="form-select" id="trangThai" th:field="*{trangThai}" required>
                <option value="" disabled selected>Chọn Trạng Thái</option>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Không hoạt động">Không hoạt động</option>
            </select>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success">💾 Lưu</button>
            <a href="/ma-giam-gia-kh/hienthi" class="btn btn-outline-secondary">🔙 Quay lại</a>
        </div>
    </form>
</div>
</body>
</html>
