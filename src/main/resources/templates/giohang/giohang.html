<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{/layout/index.html :: dynamic(~{::main})}" >
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

</head>
<body>
<main class="container mt-4">
    <style>
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 10px;
            border: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        .card:hover .card-img-top {
            transform: scale(1.1);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
        .card-text {
            font-size: 1.1rem;
        }
        .btn i {
            margin-right: 5px;
        }
        .quantity-input {
            width: 70px;
            margin-right: 5px;
            display: inline-block;
        }
    </style>
    <h3 class="text-center">Danh Sách Sản Phẩm</h3>
    <div class="row" ng-app="cartApp" ng-controller="CartController">
        <div class="col-md-4 mb-4" th:each="sanPham : ${sanPhams}">
            <div class="card h-100 text-center">
                <img th:src="@{'/images/' + ${sanPham.hinhAnh}}" alt="Hình sản phẩm" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title" th:text="${sanPham.tenSanPham}">Tên Sản Phẩm</h5>
                    <p class="card-text text-danger" th:text="${#numbers.formatCurrency(sanPham.gia)}">Giá</p>

                    <!-- Form thêm sản phẩm vào giỏ hàng với AngularJS -->
                    <div class="d-flex justify-content-center align-items-center mb-2">
                        <button type="button" class="btn btn-primary w-100" ng-click="addToCart(sanPham, quantity[sanPham.id])">
                            <i class="fas fa-cart-plus"></i> Thêm vào giỏ hàng
                        </button>
                    </div>
                    <div class="d-flex justify-content-center align-items-center mb-2">
                        <form th:action="@{/checkout}" method="post">
                            <input type="hidden" name="productId" th:value="${sanPham.id}">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-shopping-bag"></i> Mua ngay
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Import AngularJS Controller -->
    <script src="/js/addgiohang.js"></script>
    <script th:src="@{/js/addgiohang.js}"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</main>


</body>
</html>
