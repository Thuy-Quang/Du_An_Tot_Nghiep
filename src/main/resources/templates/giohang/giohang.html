<!DOCTYPE html>
<html ng-app="cartApp">
<head>
    <title>Danh Sách Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        .btn i {
            margin-right: 5px;
        }
    </style>
</head>
<body ng-controller="CartController">

<!-- Navbar with cart icon -->
<nav class="navbar navbar-light bg-light">
    <a class="navbar-brand">My Store</a>
    <button class="btn btn-outline-primary" ng-click="openCartModal()">
        <i class="fas fa-shopping-cart"></i>
        Giỏ hàng <span class="badge badge-danger">{{ cartCount }}</span>
    </button>
</nav>

<main class="container mt-4">
    <h3 class="text-center">Danh Sách Sản Phẩm</h3>
    <div class="row">
        <div class="col-md-4 mb-4" ng-repeat="sanPham in sanPhams">
            <div class="card h-100">
                <img ng-src="/images/{{sanPham.hinhAnh}}" alt="Hình sản phẩm" class="img-thumbnail" width="100">
                <div class="card-body text-center">
                    <h5 class="card-title">{{sanPham.tenSanPham}}</h5>
                    <p class="card-text text-danger">{{sanPham.gia | currency}}</p>
                    <button class="btn btn-primary" ng-click="themSanPhamVaoGio(sanPham.id, 1)">
                        <i class="fas fa-cart-plus"></i> Thêm vào giỏ hàng
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Cart Modal -->
<div class="modal fade" id="cartModal" tabindex="-1" role="dialog" aria-labelledby="cartModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="cartModalLabel">Giỏ Hàng Của Bạn</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div ng-repeat="item in cartItems">
                    <p>{{ item.sanPham.tenSanPham }} - Số lượng: {{ item.soLuong }}</p>
                </div>
                <p ng-if="cartItems.length === 0">Giỏ hàng của bạn đang trống.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="app.js"></script>

</body>
</html>
