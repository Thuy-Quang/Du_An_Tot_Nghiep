<div xmlns:th="http://www.thymeleaf.org">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .filter-group {
      margin-bottom: 20px;
    }
    .option-group label {
      display: block;
    }
  </style>
  <div class="container ">
    <div class="row">
      <!-- Phần aside bên trái -->
      <aside class="">
        <h2>Bộ lọc sản phẩm</h2>

        <div class="filter-group">
          <label>Mức giá:</label>
          <div class="option-group">
            <label><input type="checkbox" name="price" value="0-500"> 0 - 500 VNĐ</label>
            <label><input type="checkbox" name="price" value="500-1000"> 500 - 1000 VNĐ</label>
            <label><input type="checkbox" name="price" value="1000-2000"> 1000 - 2000 VNĐ</label>
            <label><input type="checkbox" name="price" value="2000+"> Trên 2000 VNĐ</label>
          </div>
        </div>

        <div class="filter-group">
          <label>Kích cỡ:</label>
          <div class="option-group">
            <label><input type="checkbox" name="size" value="S"> S</label>
            <label><input type="checkbox" name="size" value="M"> M</label>
            <label><input type="checkbox" name="size" value="L"> L</label>
            <label><input type="checkbox" name="size" value="XL"> XL</label>
          </div>
        </div>

        <div class="filter-group">
          <label>Màu sắc:</label>
          <div class="option-group">
            <label><input type="checkbox" name="color" value="red"> Đỏ</label>
            <label><input type="checkbox" name="color" value="blue"> Xanh dương</label>
            <label><input type="checkbox" name="color" value="green"> Xanh lá</label>
            <label><input type="checkbox" name="color" value="black"> Đen</label>
            <label><input type="checkbox" name="color" value="white"> Trắng</label>
          </div>
        </div>
      </aside>

      <!-- Nội dung chính -->

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
