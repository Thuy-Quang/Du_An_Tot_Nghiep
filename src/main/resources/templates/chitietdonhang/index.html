<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{/giaodienquanly/giaodienquanly.html :: dynamic(~{::quanly})}">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Chi Tiết Đơn Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5" th:fragment="quanly">
    <h1 class="text-center">Danh Sách Chi Tiết Đơn Hàng</h1>
    <div class="mb-3">
        <a href="/chi-tiet-don-hang/add" class="btn btn-primary">Thêm Chi Tiết Đơn Hàng Mới</a>
    </div>
    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Đơn Hàng</th>
            <th>Sản Phẩm</th>
            <th>Số Lượng</th>
            <th>Giá Đơn Vị</th>
            <th>Tổng Giá</th>
            <th>Hành Động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="chiTietDonHang, stat: ${list}">
            <td th:text="${chiTietDonHang.id}"></td>
            <td th:text="${chiTietDonHang.donHang.id}"></td> <!-- Hiển thị ID của đơn hàng -->
            <td th:text="${chiTietDonHang.sanPham.tenSanPham}"></td> <!-- Hiển thị tên sản phẩm -->
            <td th:text="${chiTietDonHang.soLuong}"></td>
            <td th:text="${chiTietDonHang.giaDonVi}"></td>
            <td th:text="${chiTietDonHang.tongGia}"></td> <!-- Tính toán tổng giá -->
            <td>
                <a th:href="@{/chi-tiet-don-hang/edit/{id}(id=${chiTietDonHang.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <form th:action="@{/chi-tiet-don-hang/delete/{id}(id=${chiTietDonHang.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa không?');">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
