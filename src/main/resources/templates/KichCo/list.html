<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>List of Kích Cỡ</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">
        Danh sách Kích Cỡ</h1>
    <a class="btn btn-primary mb-3" th:href="@{/kich-co/add}"><i class="fas fa-plus"></i>Thêm Kích Cỡ</a>
    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>Tên Kích Cỡ</th>
                <th>Trạng Thái</th>
                <th class="text-center"> Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="kichCo : ${kichCoList}">
                <td th:text="${kichCo.id}"></td>
                <td th:text="${kichCo.tenKichCo}"></td>
                <td th:text="${kichCo.trangThai}"></td>
                <td class="text-center">
                    <a class="btn btn-sm btn-warning" th:href="@{/kich-co/edit/{id}(id=${kichCo.id})}">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <a class="btn btn-sm btn-danger" th:href="@{/kich-co/delete/{id}(id=${kichCo.id})}" onclick="return confirm('Bạn có chắc chắn muốn xóa không?')">
                        <i class="fas fa-trash-alt"></i> Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Bootstrap JS (Optional) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
