<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Kích Cỡ</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Thêm Kích Cỡ</h1>
    <form th:action="@{/kich-co/add}" th:object="${kichCo}" method="post" class="needs-validation" novalidate>
        <div class="form-group">
            <label for="tenKichCo">Tên Kích Cỡ:</label>
            <input type="text" id="tenKichCo" th:field="*{tenKichCo}" class="form-control" placeholder="Nhập tên kích cỡ" required>
            <div class="invalid-feedback">Tên Kích Cỡ không được để trống.</div>
        </div>
        <div class="form-group">
            <label for="trangThai">Trạng Thái:</label>
            <select id="trangThai" th:field="*{trangThai}" class="form-control">
                <option value="Còn Hàng">Còn Hàng</option>
                <option value="Hết Hàng">Hết Hàng</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Thêm
        </button>
        <a href="/kich-co/list" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
    </form>
</div>

<!-- Bootstrap JS (Optional) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
    // Bootstrap validation
    (function() {
        'use strict';
        window.addEventListener('load', function() {
            var forms = document.getElementsByClassName('needs-validation');
            Array.prototype.filter.call(forms, function(form) {
                form.addEventListener('submit', function(event) {
                    if (form.checkValidity() === false) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        }, false);
    })();
</script>
</body>
</html>
