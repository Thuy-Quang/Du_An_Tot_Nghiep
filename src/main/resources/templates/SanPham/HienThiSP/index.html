<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<main>
<!-- Nội dung trang được thay thế -->
<div class="container"  >

    <!-- Tiêu đề -->
    <h1 class="text-center my-4">Sản Phẩm</h1>

    <!-- Nút thêm sản phẩm -->
    <a class="btn btn-primary mb-4" th:href="@{/HienThi/create}">Thêm Sản Phẩm</a>

    <!-- Bảng hiển thị sản phẩm -->
    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>Mô tả</th>
            <th>Gía</th>
            <th>Hình ảnh</th>
            <th>Màu sắc</th>
            <th>Kích cỡ</th>
            <th>Số lượng</th>
            <th>Trạng thái</th>
            <th>Ngày tạo</th>
            <th>Loại sản phẩm</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <!-- Lặp qua danh sách sản phẩm -->
        <tr th:each="sanPham, stat : ${listSPham}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${sanPham.tenSanPham}"></td>
            <td th:text="${sanPham.moTa}"></td>
            <td th:text="${sanPham.gia + ' đ'}"></td>
            <td>
                <img th:src="@{'/images/' + ${sanPham.hinhAnh}}" alt="Ảnh sản phẩm" width="100">
            </td>
            <td th:text="${sanPham.mauSac}"></td>
            <td th:text="${sanPham.kichCo}"></td>
            <td th:text="${sanPham.soLuong}"></td>
            <td th:text="${sanPham.trangThai == 'conHang' ? 'Còn hàng' : 'Hết hàng'}"></td>
            <td th:text="${sanPham.ngayTao}"></td>
            <td th:text="${sanPham.loaiSanPham.tenLoai}"></td>
            <td>
                <a class="btn btn-primary btn-sm mb-1" th:href="@{/HienThi/listSPham/edit/id/{id}(id=${sanPham.id})}">Sửa</a>
                <a class="btn btn-info btn-sm mb-1" th:href="@{/HienThi/listSPham/detail/id/{id}(id=${sanPham.id})}">Chi tiết</a>
                <form th:action="@{/HienThi/listSPham/delete/id/{id}(id=${sanPham.id})}" method="POST" onsubmit="return confirm('Bạn có chắc chắn muốn xóa không?');" class="d-inline">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</main>
</body>
</html>
