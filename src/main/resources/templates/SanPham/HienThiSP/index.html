<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/giaodienquanly/giaodienquanly.html :: dynamic(~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>

<main>
    <div class="container">

        <br><br><H1 class="text-center">Sản Phẩm</H1><br><br>


        <h1 class="text-center my-4">Sản Phẩm</h1>
        <a class="btn btn-primary" href="/HienThi/create">Thêm Sản Phẩm</a>
        <br>
        <br>
        <table class="table table-bordered table-hover ">
            <thead>
            <tr>
                <th>STT</th>
                <!--        <th>ID</th>-->
                <th>Tên sản phẩm</th>
                <th>Mô tả</th>
                <th>Gía</th>
                <th>Hình ảnh</th>
                <th>Màu sắc</th>
                <th>Kích cỡ</th>
                <th>Số lượng</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th>Loại sản phẩm</th>
                <th>ACTYON</th>
            </tr>
            </thead>
            <tbody>

            <tr th:each="sanPham , stat: ${listSPham}" >

                <td th:text="${stat.index+1}"></td>
                <td th:text="${sanPham.tenSanPham}"></td>
                <td th:text="${sanPham.moTa}"></td>
                <td th:text="${sanPham.gia+ '00đ'}"></td>

                <td>
                    <img th:src="@{'/images/' + ${sanPham.hinhAnh}}" alt="" width="100">
                </td>

                <td th:text="${sanPham.mauSac}"></td>
                <td th:text="${sanPham.kichCo}"></td>
                <td th:text="${sanPham.soLuong}"></td>
                <td th:text="${sanPham.trangThai == 'conHang' ? 'Còn hàng' : 'Hết hàng'}"></td>
                <td th:text="${sanPham.ngayTao}" height="100px" width="100px"></td>
                <td th:text="${sanPham.loaiSanPham.tenLoai}"></td>
                <td style="white-space: nowrap" >

                    <a class="btn btn-primary btn-sm"
                       th:href="@{/HienThi/listSPham/edit/id/{id}(id=${sanPham.id})}">Edit</a>
                    <br>
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/HienThi/listSPham/detail/id/{id}(id=${sanPham.id})}">Detail</a>
                    <a><br>
                        <form th:action="@{/HienThi/listSPham/delete/id/{id}(id=${sanPham.id})}" method="POST" onsubmit="return confirm('Bạn có chắc chắn muốn xóa không?');">
                            <input type="hidden" name="_method" value="DELETE" />
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </a>
                </td>
            </tr>
            </tbody>

        </table>
    </div>
</main>
</body>
</html>
