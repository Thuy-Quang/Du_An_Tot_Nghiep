<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/giaodienquanly/giaodienquanly.html :: dynamic(~{::main})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sản Phẩm</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main>

    <div class="container mt-5">
        <h2 class="mb-4">Thêm Sản Phẩm</h2>
        <form href="/HienThi/create" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="tenSanPham" class="form-label">Tên Sản Phẩm</label>
                <input type="text" class="form-control" id="tenSanPham" name="tenSanPham" placeholder="Nhập tên sản phẩm" required>
            </div>

            <div class="mb-3">
                <label for="moTa" class="form-label">Mô Tả</label>
                <textarea class="form-control" id="moTa" name="moTa" rows="3" placeholder="Nhập mô tả sản phẩm" required></textarea>
            </div>

            <div class="mb-3">
                <label for="gia" class="form-label">Giá</label>
                <input type="number" class="form-control" id="gia" name="gia" placeholder="Nhập giá sản phẩm" required>
            </div>

            <div class="mb-3">
                <label for="hinhAnh" class="form-label">Hình Ảnh</label>
                <input type="file" class="form-control" id="hinhAnh" name="hinhAnh" required>
            </div>

            <div class="mb-3">
                <label for="mauSac" class="form-label">Màu Sắc</label>
                <input type="text" class="form-control" id="mauSac" name="mauSac" placeholder="Nhập màu sắc sản phẩm" required>
            </div>

            <div class="mb-3">
                <label for="kichCo" class="form-label">Kích Cỡ</label>
                <input type="text" class="form-control" id="kichCo" name="kichCo" placeholder="Nhập kích cỡ sản phẩm" required>
            </div>

            <div class="mb-3">
                <label for="soLuong" class="form-label">Số Lượng</label>
                <input type="number" class="form-control" id="soLuong" name="soLuong" placeholder="Nhập số lượng sản phẩm" required>
            </div>

            <div class="mb-3">
                <label for="trangThai" class="form-label">Trạng Thái</label>
                <select class="form-select" id="trangThai" name="trangThai">
                    <option value="Trạng Thái Còn Hàng">Còn hàng</option>
                    <option value="Trạng Thái Hết Hàng">Hết hàng</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="loaiSanPham" class="form-label">Loại Sản Phẩm</label>
                <select class="form-select" id="loaiSanPham" name="loaiSanPham" required>
                    <option value="" disabled selected>Chọn loại sản phẩm</option> <!-- Option mặc định -->
                    <option th:each="loai : ${listLSP}"
                            th:value="${loai.id}"
                            th:text="${loai.tenLoai}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Lưu Sản Phẩm</button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</main>
</body>
</html>
