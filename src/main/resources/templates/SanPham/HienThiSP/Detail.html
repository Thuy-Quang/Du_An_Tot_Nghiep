<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/giaodienquanly/giaodienquanly.html :: dynamic(~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>


    <div class="container">

        <div class="row">

            <div class="col-md-8 mx-auto rounded border p-4 m-4"> </div>

            <h2 class="text-center mb-5">Chi tiết sản phẩm</h2>

            <form enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="tenSanPham" class="form-label">Tên Sản Phẩm</label>
                    <input type="text" class="form-control" id="tenSanPham" name="tenSanPham" th:value="${detail.tenSanPham}" disabled placeholder="Nhập tên sản phẩm" required>
                </div>

                <div class="mb-3">
                    <label for="moTa" class="form-label">Mô Tả</label>
                    <textarea class="form-control" id="moTa" name="moTa" th:text="${detail.moTa}" disabled rows="3" placeholder="Nhập mô tả sản phẩm" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="gia" class="form-label">Giá</label>
                    <input type="number" class="form-control" id="gia" name="gia" th:value="${detail.gia}" disabled placeholder="Nhập giá sản phẩm" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Hình Ảnh</label>
                    <img th:src="@{'/images/' + ${detail.hinhAnh}}" alt="" width="100">
                </div>

                <div class="mb-3">
                    <label for="mauSac" class="form-label">Màu Sắc</label>
                    <input type="text" class="form-control" id="mauSac" name="mauSac" th:value="${detail.mauSac}" disabled placeholder="Nhập màu sắc sản phẩm" required>
                </div>

                <div class="mb-3">
                    <label for="kichCo" class="form-label">Kích Cỡ</label>
                    <input type="text" class="form-control" id="kichCo" name="kichCo" th:value="${detail.kichCo}" disabled placeholder="Nhập kích cỡ sản phẩm" required>
                </div>

                <div class="mb-3">
                    <label for="soLuong" class="form-label">Số Lượng</label>
                    <input type="number" class="form-control" id="soLuong" name="soLuong" th:value="${detail.soLuong}" disabled placeholder="Nhập số lượng sản phẩm" required>
                </div>

                <div class="mb-3">
                    <label for="trangThai" class="form-label">Trạng Thái</label>
                    <select class="form-select" id="trangThai" name="trangThai" disabled>
                        <option value="" disabled>Chọn trạng thái</option>
                        <option value="conHang" th:selected="${detail.trangThai == 'conHang'}">Còn hàng</option>
                        <option value="hetHang" th:selected="${detail.trangThai == 'hetHang'}">Hết hàng</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="loaiSanPham" class="form-label">Loại Sản Phẩm</label>
                    <select class="form-select" id="loaiSanPham" name="loaiSanPham" disabled>
                        <option value="" disabled selected>Chọn loại sản phẩm</option>
                        <option th:each="loai : ${listLSP}"
                                th:value="${loai.id}"
                                th:text="${loai.tenLoai}"
                                th:selected="${loai.id} == ${detail.loaiSanPham.id}">
                        </option>
                    </select>
                </div>

                <a th:href="@{/HienThi/GetAll}" class="btn btn-secondary">Quay lại</a>
                <a th:href="@{/HienThi/listSPham/edit/id/{id}(id=${detail.id})}" class="btn btn-warning">Cập nhật sản phẩm</a>
            </form>

        </div>

    </div>



</body>
</html>
