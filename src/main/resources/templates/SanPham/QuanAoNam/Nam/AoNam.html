<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .card{
            margin-top: 20px;
            border: 1px solid #ccc;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .card:hover {
            padding: 10px;
            border: 1px solid #121111;
            transition: .4s;
        }

        footer{margin-top: 70px}

    </style>
</head>
<body>

<header class="row">
    <marquee direction="right" scrollamount="15" class="bg-danger text-white ">Chào mừng bạn đến với website bán quần áo SH Shop</marquee>

</header>
<nav class="row text-center">
    <div th:replace="/layout/menu.html"></div>

        <!-- Indicators/dots -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
        </div>
</nav>
<div>

<!--    Hiển thị sản phẩm-->

    <div class="row" style="align-items: center; justify-content: space-between; padding: 10px">

        <div class="col-sm-3" th:each="sp : ${lists}">
            <div class="card" >
                <img th:src="@{'/images/'+${sp.hinhAnh}}" class="d-block" style="width:100%;">
            </div>

            <div class="text-center test" th:text="${sp.tenSanPham}"></div>

            <div class="text-center foter">
                <span style="text-decoration-line: line-through">500.000đ</span>
                <span>-</span>
                <span style="color: red" th:text="${sp.gia}+ '00đ'"></span>
            </div>
        </div>
    </div>


<!--    Phân trang-->

    <div class="text-center" style="width: 100%; display: flex; justify-content: center;" >
        <nav aria-label="Page navigation example">
            <ul class="pagination">
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>


</div>



<div>
    <style>.float-contact {
        position: fixed;
        bottom: 40px;
        left: 20px;
        z-index: 99999;
    }
    .chat-zalo {
        background: #8eb22b;
        border-radius: 20px;
        padding: 0 18px;
        color: white;
        display: block;
        margin-bottom: 6px;
    }
    .chat-face {
        background: #125c9e;
        border-radius: 20px;
        padding: 0 18px;
        color: white;
        display: block;
        margin-bottom: 6px;
    }
    .float-contact .hotline {
        background: #d11a59!important;
        border-radius: 20px;
        padding: 0 18px;
        color: white;
        display: block;
        margin-bottom: 6px;
    }
    .chat-zalo a, .chat-face a, .hotline a {
        font-size: 15px;
        color: white;
        font-weight: 400;
        text-transform: none;
        line-height: 0;
    }
    .float-contact .chat-zalo:hover, .float-contact .chat-face:hover, .float-contact .hotline:hover{
        box-shadow: -3px 2px 2px 1px #121111;
    }
    @media (max-width: 549px){
        .float-contact{
            /* display:none */
        }
    }</style>
    <div class="float-contact">
        <button class="chat-zalo">
            <a href="http://zalo.me/0338482004">Chat Zalo</a>
        </button>
        <button class="chat-face">
            <a href="https://www.facebook.com/profile.php?id=100038725072291">Chat Facebook</a>
        </button>
        <button class="hotline">
            <a href="tel:0338482004">Hotline: 0338.482.004</a>
        </button>
    </div>
</div>


<footer class="row" >
    <div th:replace="/layout/footer.html "></div>
</footer>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</body>
</html>
