<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Người dùng</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center">Danh sách Người dùng</h1>
    <div class="d-flex justify-content-end mb-3">
        <a th:href="@{/nguoi-dung/them}" class="btn btn-primary">Thêm Người dùng</a>
    </div>

    <table class="table table-bordered table-hover table-striped">
        <thead class="table-dark">
        <tr>
            <th>STT</th>
            <th>Tên đăng nhập</th>
            <th>Họ tên</th>
            <th>Email</th>
            <th>Số điện thoại</th>
            <th>Địa chỉ</th> <!-- Thêm cột Địa chỉ -->
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="nguoiDung, stat : ${nguoiDungs}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${nguoiDung.tenDangNhap}"></td>
            <td th:text="${nguoiDung.hoTen}"></td>
            <td th:text="${nguoiDung.email != null ? nguoiDung.email : 'Chưa có email'}"></td>
            <td th:text="${nguoiDung.soDienThoai != null ? nguoiDung.soDienThoai : 'Chưa có SĐT'}"></td>
            <td th:text="${nguoiDung.diaChi != null ? nguoiDung.diaChi : 'Chưa có địa chỉ'}"></td> <!-- Hiển thị Địa chỉ -->
            <td class="text-center align-middle">
                <a th:href="@{/nguoi-dung/chi-tiet/{id}(id=${nguoiDung.id})}" class="btn btn-info btn-sm">Chi tiết</a>
                <a th:href="@{/nguoi-dung/sua/{id}(id=${nguoiDung.id})}" class="btn btn-warning btn-sm mx-1">Sửa</a>
                <a th:href="@{/nguoi-dung/xoa/{id}(id=${nguoiDung.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa không?');">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/nguoi-dung(page=${currentPage - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:text="${i + 1}" th:href="@{/nguoi-dung(page=${i})}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/nguoi-dung(page=${currentPage + 1})}">Tiếp</a>
            </li>
        </ul>
    </nav>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
