<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<div class="container">

    <br><br><h1 class="text-center">Danh Sách Đơn Hàng</h1><br><br>

    <a class="btn btn-primary mb-3" href="/HienThiDonHang/create">Thêm Đơn Hàng</a>

    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>STT</th>
            <th>Người dùng</th>
            <th>Trạng thái đơn hàng</th>
            <th>Tổng tiền</th>
            <th>Phương thức thanh toán</th>
            <th>Địa chỉ</th>
            <th>Ngày tạo</th>
            <th>Trạng thái thanh toán</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="donHang, stat : ${listDonHang}">
            <td th:text="${stat.index+1}"></td>
            <td th:text="${donHang.nguoiDung.hoTen}"></td>
            <td th:text="${donHang.trangThai}"></td>
            <td th:text="${donHang.tongTien + ' VND'}"></td>
            <td th:text="${donHang.phuongThucThanhToan}"></td>
            <td th:text="${donHang.diaChi}"></td>
            <td th:text="${#dates.format(donHang.ngayTao, 'dd-MM-yyyy HH:mm')}"></td>
            <td th:text="${donHang.trangThaiThanhToan}"></td>
            <td>
                <a class="btn btn-warning btn-sm" th:href="@{/HienThiDonHang/listDonHang/edit/id/{id}(id=${donHang != null ? donHang.id : 0})}">Sửa</a>
                <form th:action="@{/HienThiDonHang/listDonHang/delete/id/{id}(id=${donHang != null ? donHang.id : 0})}" method="post" style="display:inline-block" onsubmit="return confirm('Bạn có chắc chắn muốn xóa đơn hàng này không?');">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>

            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
