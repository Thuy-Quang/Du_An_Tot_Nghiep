<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Đơn Hàng</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4">Thêm Đơn Hàng</h2>
    <form action="/HienThiDonHang/create" method="post" enctype="multipart/form-data">
        <!-- Người dùng -->
        <div class="mb-3">
            <label for="nguoiDung" class="form-label">Người Dùng</label>
            <select class="form-select" id="nguoiDung" name="nguoiDungId" required> <!-- Đổi thành nguoiDungId -->
                <option value="" disabled selected>Chọn người dùng</option> <!-- Option mặc định -->
                <option th:each="nguoiDung : ${listNguoiDung}"
                        th:value="${nguoiDung.id}"
                        th:text="${nguoiDung.hoTen}"></option>
            </select>
        </div>

        <!-- Trạng thái -->
        <div class="mb-3">
            <label for="trangThai" class="form-label">Trạng Thái</label>
            <select class="form-select" id="trangThai" name="trangThai" required>
                <option value="Đang xử lý">Đang xử lý</option>
                <option value="Đã giao hàng">Đã giao hàng</option>
                <option value="Đã hủy">Đã hủy</option>
            </select>
        </div>

        <!-- Tổng tiền -->
        <div class="mb-3">
            <label for="tongTien" class="form-label">Tổng Tiền</label>
            <input type="number" class="form-control" id="tongTien" name="tongTien" placeholder="Nhập tổng tiền" required>
        </div>

        <!-- Phương thức thanh toán -->
        <div class="mb-3">
            <label for="phuongThucThanhToan" class="form-label">Phương Thức Thanh Toán</label>
            <select class="form-select" id="phuongThucThanhToan" name="phuongThucThanhToan" required>
                <option value="TienMat">Tiền mặt</option>
                <option value="ChuyenKhoan">Chuyển khoản</option>

            </select>
        </div>

        <!-- Địa chỉ -->
        <div class="mb-3">
            <label for="diaChi" class="form-label">Địa Chỉ Giao Hàng</label>
            <input type="text" class="form-control" id="diaChi" name="diaChi" placeholder="Nhập địa chỉ giao hàng" required>
        </div>

        <!-- Trạng thái thanh toán -->
        <div class="mb-3">
            <label for="trangThaiThanhToan" class="form-label">Trạng Thái Thanh Toán</label>
            <select class="form-select" id="trangThaiThanhToan" name="trangThaiThanhToan" required>
                <option value="Chưa thanh toán">Chưa thanh toán</option>
                <option value="Đã thanh toán">Đã thanh toán</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Lưu Đơn Hàng</button>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
