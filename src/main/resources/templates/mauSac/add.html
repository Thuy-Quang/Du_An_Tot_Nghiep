<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{/giaodienquanly/giaodienquanly.html :: dynamic(~{::quanly})}">
<head>
    <title>Add Màu Sắc</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome cho icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-5" th:fragment="quanly">
    <h1 class="mb-4">Thêm Màu Sắc</h1>
    <form th:action="@{/mau-sac/add}" th:object="${mauSac}" method="post">
        <div class="mb-3">
            <label for="tenMau" class="form-label">Tên Màu:</label>
            <input type="text" id="tenMau" th:field="*{tenMau}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label for="trangThai" class="form-label">Trạng Thái:</label>
            <select id="trangThai" th:field="*{trangThai}" class="form-select">
                <option value="Còn hàng">Còn Hàng</option>
                <option value="Hết hàng">Hết Hàng</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-save"></i> Lưu
        </button>
        <a href="/mau-sac/list" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
    </form>
</div>

<!-- Bootstrap JS và Popper.js -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
