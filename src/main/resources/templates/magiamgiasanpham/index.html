<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh Sách Mã Giảm Giá Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Danh Sách Mã Giảm Giá Sản Phẩm</h1>
    <div class="d-flex justify-content-end mb-3">
        <div class="d-flex justify-content-end mb-3">
            <a href="javascript:void(0);" onclick="submitForm(event, '/ma-giam-gia-san-pham/add', document.getElementById('maGiamGiaForm'))" class="btn btn-primary">
                Thêm Mã Giảm Giá
            </a>
        </div>
    </div>
    <table class="table table-bordered table-striped table-hover">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Sản Phẩm</th>
            <th>Ngày Áp Dụng</th>
            <th>Ngày Hết Hạn</th>
            <th>Trạng Thái</th>
            <th>Hành Động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="maGiamGiaSanPham : ${list}">
            <td th:text="${maGiamGiaSanPham.id}"></td>
            <td th:text="${maGiamGiaSanPham.sanPham.tenSanPham}"></td>
            <!-- Sửa lại phần định dạng ngày tháng -->
            <td th:text="${#temporals.format(maGiamGiaSanPham.ngayApDung, 'dd-MM-yyyy')}"></td>
            <td th:text="${#temporals.format(maGiamGiaSanPham.ngayHetHan, 'dd-MM-yyyy')}"></td>
            <td th:text="${maGiamGiaSanPham.trangThai}"></td>
            <td class="d-flex">
                <!-- Chi tiết mã giảm giá sản phẩm -->
                <a href="javascript:void(0);"
                   th:onclick="'loadContent(\'/ma-giam-gia-san-pham/detail/' + ${maGiamGiaSanPham.id} + '\')'"
                   class="btn btn-info btn-sm me-2">Chi tiết</a>

                <!-- Sửa mã giảm giá sản phẩm -->
                <a href="javascript:void(0);"
                   th:onclick="'loadContent(\'/ma-giam-gia-san-pham/edit/' + ${maGiamGiaSanPham.id} + '\')'"
                   class="btn btn-warning btn-sm me-2">Sửa</a>

                <!-- Xóa mã giảm giá sản phẩm -->
                <a href="javascript:void(0);"
                   th:onclick="'deleteItem(\'/ma-giam-gia-san-pham/delete/' + ${maGiamGiaSanPham.id} + '\')'"
                   class="btn btn-danger btn-sm">Xóa</a>
            </td>

        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
