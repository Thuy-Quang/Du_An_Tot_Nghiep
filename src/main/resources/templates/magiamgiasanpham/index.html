<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh Sách Mã Giảm Giá Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Danh Sách Mã Giảm Giá Sản Phẩm</h1>
    <div class="d-flex justify-content-end mb-3">
        <a href="/ma-giam-gia-san-pham/add" class="btn btn-primary">Thêm Mã Giảm Giá Mới</a>
    </div>
    <table class="table table-bordered table-striped table-hover">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Sản Phẩm</th>
            <th>Ngày Áp Dụng</th>
            <th>Ngày Hết Hạn</th>
            <th>Trạng Thái</th>
            <th>Hành Động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="maGiamGiaSanPham : ${list}">
            <td th:text="${maGiamGiaSanPham.id}"></td>
            <td th:text="${maGiamGiaSanPham.sanPham.tenSanPham}"></td>
            <!-- Sửa lại phần định dạng ngày tháng -->
            <td th:text="${#temporals.format(maGiamGiaSanPham.ngayApDung, 'dd-MM-yyyy')}"></td>
            <td th:text="${#temporals.format(maGiamGiaSanPham.ngayHetHan, 'dd-MM-yyyy')}"></td>
            <td th:text="${maGiamGiaSanPham.trangThai}"></td>
            <td class="d-flex">
                <a th:href="@{/ma-giam-gia-san-pham/detail/{id}(id=${maGiamGiaSanPham.id})}" class="btn btn-info btn-sm me-2">Chi tiết</a>
                <a th:href="@{/ma-giam-gia-san-pham/edit/{id}(id=${maGiamGiaSanPham.id})}" class="btn btn-warning btn-sm me-2">Sửa</a>
                <form th:action="@{/ma-giam-gia-san-pham/delete/{id}(id=${maGiamGiaSanPham.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa không?');">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
